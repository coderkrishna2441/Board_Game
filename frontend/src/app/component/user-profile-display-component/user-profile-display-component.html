<nav class="navbar">

  <img src="assets/images/boardgame1_logo.png"
       [routerLink]="['/member/',username]"
       class="logo"/>

     <div class="dropdown">

                <button class="dropbtn" (click)="toggleDropdown()">
                    Profile ▼
                </button>

                <div class="dropdown-content" [class.open]="dropdownOpen">
                    <a [routerLink]="['/userinfo', username]">Profile Display</a>
                    <a [routerLink]="['/edituserinfo', username]">Edit Profile</a>
                    <a routerLink="/home">Sign Out</a>
                </div>

     </div>

</nav>

<div class="profile-view">

<div class="header">
<img [src]="profile.pfp" class="profile-pfp">
<h2 class="title">{{profile?.firstname}} Profile Information</h2>
</div>

<div class="profile-grid">

<div class="info-box">
<label>First Name</label>
<span>{{profile?.firstname}}</span>
</div>

<div class="info-box">
<label>Last Name</label>
<span>{{profile?.lastname}}</span>
</div>

<div class="info-box">
<label>Address</label>
<span>{{profile?.address}}</span>
</div>

<div class="info-box">
<label>Phone Number</label>
<span>{{profile?.phone}}</span>
</div>

<div class="info-box">
<label>Member Type</label>
<span>{{profile?.membertype}}</span>
</div>

<div class="info-box">
<label>Email</label>
<span>{{profile?.email}}</span> 
</div>

<div class="info-box bio-box">
<label>Bio</label>
<span>{{profile?.bio}}</span>
</div>

</div>

</div>
